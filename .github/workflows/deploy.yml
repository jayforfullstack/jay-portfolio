name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; skip queued runs, keep latest
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: portfolio-app

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: portfolio-app

      - name: Build
        run: npm run build
        working-directory: portfolio-app
        env:
          # Set to /your-repo-name/ for GitHub Pages project sites.
          # Deployed to: https://jayforfullstack.github.io/jay-portfolio/
          # If you use a custom domain (CNAME), change this to /
          VITE_BASE_PATH: /jay-portfolio/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio-app/dist

  # ── 2. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

